name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/github-actions-kubernetes-masterclass"

            if [ ! -d "$APP_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            
            if [ ! -f .env ]; then
              echo "ERROR: .env file missing on EC2"
              exit 1
            fi

            docker compose pull
            docker compose up -d
            docker image prune -f

            docker compose ps

            echo "Waiting for services to become healthy..."
            MAX_ATTEMPTS=30
            ATTEMPT=1

            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS"

              FRONTEND_OK=false
              BACKEND_OK=false

              if curl -fsS http://localhost >/dev/null 2>&1; then
                FRONTEND_OK=true
              fi

              if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
                BACKEND_OK=true
              fi

              if [ "$FRONTEND_OK" = true ] && [ "$BACKEND_OK" = true ]; then
                echo "Deployment health check passed"
                docker compose ps
                exit 0
              fi

              sleep 5
              ATTEMPT=$((ATTEMPT + 1))
            done

            echo "Deployment health check failed"
            docker compose ps
            docker compose logs --tail=80
            exit 1
