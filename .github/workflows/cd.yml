name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using Helm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/github-actions-kubernetes-masterclass"

            if [ ! -d "$APP_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git pull origin main

            if ! command -v kubectl >/dev/null 2>&1; then
              echo "kubectl is not installed on target server"
              exit 1
            fi

            if ! command -v helm >/dev/null 2>&1; then
              curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            fi

            helm upgrade --install skillpulse-dev helm/skillpulse \
              -f helm/skillpulse/values-dev.yaml \
              -n skillpulse-dev \
              --create-namespace \
              --wait \
              --timeout 5m

            kubectl get pods -n skillpulse-dev
            helm list -n skillpulse-dev
