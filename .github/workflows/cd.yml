name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/github-actions-kubernetes-masterclass"

            if [ ! -d "$APP_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git pull origin main

            if [ ! -f .env ]; then
              echo "ERROR: .env file missing on EC2"
              exit 1
            fi

            docker compose pull
            docker compose up -d
            docker image prune -f

            docker compose ps
